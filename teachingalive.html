<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teaching Alive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Tenor Sans', system-ui, sans-serif;
  }
  .gallery {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    max-width: 95vw;
  }
  .gallery img {
    max-height: 85vh;
    max-width: 92vw;
    border-radius: 10px;
    object-fit: contain;
  }
  .footer {
    text-align: center;
    padding: 24px 24px 48px;
  }
  .footer a {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .footer a:hover {
    color: #ccc;
  }
</style>
</head>
<body>
  <div class="gallery">
    <img src="_assets/images/I teach/teaching.png" alt="Teaching alive">
  </div>
  <div class="footer">
    <a href="/">&larr; Back to portfolio</a>
  </div>

</html>
